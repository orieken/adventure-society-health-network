services:
  - type: web
    name: ashn-api-gateway
    runtime: go
    plan: free
    buildCommand: go build -o bin/api-gateway ./apps/api-gateway
    startCommand: ./bin/api-gateway
    healthCheckPath: /v1/health
    envVars:
      - key: API_GATEWAY_ADDR
        value: :10000
      - key: PAYER_CORE_URL
        value: https://ashn-payer-core.onrender.com
      - key: PROVIDER_SERVICE_URL
        value: https://ashn-provider-service.onrender.com
      - key: EDI_INTAKE_URL
        value: https://ashn-edi-intake.onrender.com
      - key: ASHN_RATE_LIMIT_REQUESTS
        value: "1200"
      - key: ASHN_RATE_LIMIT_WINDOW
        value: 1m

  - type: web
    name: ashn-payer-core
    runtime: go
    plan: free
    buildCommand: go build -o bin/payer-core ./apps/payer-core
    startCommand: ./bin/payer-core
    healthCheckPath: /health
    envVars:
      - key: PAYER_CORE_ADDR
        value: :10000
      - key: ASHN_AUTO_MIGRATE
        value: "true"
      - key: ASHN_EMBED_WORKER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ashn-postgres
          property: connectionString

  - type: web
    name: ashn-provider-service
    runtime: go
    plan: free
    buildCommand: go build -o bin/provider-service ./apps/provider-service
    startCommand: ./bin/provider-service
    healthCheckPath: /health
    envVars:
      - key: PROVIDER_SERVICE_ADDR
        value: :10000
      - key: PAYER_CORE_URL
        value: https://ashn-payer-core.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ashn-postgres
          property: connectionString

  - type: web
    name: ashn-edi-intake
    runtime: go
    plan: free
    buildCommand: go build -o bin/edi-intake ./apps/edi-intake
    startCommand: ./bin/edi-intake
    healthCheckPath: /health
    envVars:
      - key: EDI_INTAKE_ADDR
        value: :10000
      - key: PAYER_CORE_URL
        value: https://ashn-payer-core.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ashn-postgres
          property: connectionString

databases:
  - name: ashn-postgres
    plan: free
    databaseName: ashn
    user: ashn_user
